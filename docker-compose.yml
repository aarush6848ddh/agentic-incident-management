services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinelai
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"